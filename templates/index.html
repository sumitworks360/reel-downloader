<!DOCTYPE html>
<html>
<head>
    <title>Reel Downloader</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        input {
            width: 300px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        #status {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>📥 Instagram Reel Downloader</h1>

    <input type="text" id="urlInput" placeholder="Paste Reel URL here">
    <button onclick="downloadReel()">Download</button>

    <p id="status"></p>

    <script>
        async function downloadReel() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");

            if (!url) {
                status.innerText = "Please enter a URL";
                return;
            }

            status.innerText = "Downloading... ⏳";

            try {
                const response = await fetch('/api/download/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    throw new Error("Download failed");
                }

                const data = await response.json();

                if (!data.download_url) {
                throw new Error("No download link found");
                }

                // Clear previous content
                status.innerHTML = "";

                // 🎥 Create video preview
                const video = document.createElement('video');
                video.src = data.download_url;
                video.controls = true;
                video.style.width = "300px";
                video.style.marginTop = "20px";

                // ⬇️ Create download button
                const downloadBtn = document.createElement('a');
                downloadBtn.href = data.download_url;
                downloadBtn.innerText = "Download Video";
                downloadBtn.style.display = "block";
                downloadBtn.style.marginTop = "10px";
                downloadBtn.style.color = "#22c55e";

                // Important for download
                downloadBtn.setAttribute("download", "reel.mp4");

                // Add to page
                status.appendChild(video);
                status.appendChild(downloadBtn);


            } catch (error) {
                status.innerText = "Error downloading reel ❌";
            }
        }
    </script>

</body>
</html>
