<!DOCTYPE html>
<html>
<head>
    <title>Reel Downloader</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        input {
            width: 300px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        #status {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>📥 Instagram Reel Downloader</h1>

    <input type="text" id="urlInput" placeholder="Paste Reel URL here">
    <button onclick="downloadReel()">Download</button>

    <p id="status"></p>

    <script>
        async function downloadReel() {
            const url = document.getElementById("urlInput").value;
            const status = document.getElementById("status");

            if (!url) {
                status.innerText = "Please enter a URL";
                return;
            }

            status.innerText = "Downloading... ⏳";

            try {
                const response = await fetch('/api/download/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    throw new Error("Download failed");
                }

                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = "reel.mp4";
                document.body.appendChild(a);
                a.click();
                a.remove();

                status.innerText = "Download complete ✅";

            } catch (error) {
                status.innerText = "Error downloading reel ❌";
            }
        }
    </script>

</body>
</html>
